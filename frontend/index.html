                        <button id="nav-pro-btn" onclick="app.openPremiumPromo()" class="relative flex items-center font-black text-neutral-900 bg-gradient-to-r from-yellow-400 to-yellow-600 hover:from-yellow-300 hover:to-yellow-500 transition-colors shrink-0 px-3 py-1.5 rounded-lg shadow-[0_0_10px_rgba(234,179,8,0.4)] text-xs uppercase tracking-wider" title="Upgrade to PRO"><i data-lucide="sparkles" class="h-4 w-4 sm:mr-1 shrink-0"></i><span class="hidden sm:inline truncate">PRO</span></button>
                        <button onclick="app.openLeaderboard()" class="relative flex items-center font-bold text-neutral-400 hover:text-white transition-colors shrink-0 px-1 py-2" id="nav-leaderboard-btn" title="Leaderboard"><i data-lucide="bar-chart-2" class="h-6 w-6 sm:h-7 sm:w-7 sm:mr-1.5 shrink-0"></i><span class="hidden sm:inline truncate text-base">Ranks</span></button>
                        <button onclick="app.setView('messages')" class="relative flex items-center font-bold text-neutral-400 hover:text-white transition-colors shrink-0 px-1 py-2" id="nav-messages-btn" title="Messages"><i data-lucide="message-square" class="h-6 w-6 sm:h-7 sm:w-7 sm:mr-1.5 shrink-0"></i><span class="hidden sm:inline truncate text-base">Inbox</span><span id="unread-badge" class="hidden absolute -top-1 -right-1 sm:-right-2 bg-red-500 text-white text-[11px] font-black px-2 py-0.5 rounded-full border-2 border-neutral-900">0</span></button>

    <div id="modals-container" class="relative z-50"></div>

    <script type="module">
        import * as THREE from 'three';
        import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
        import { RoomEnvironment } from 'three/addons/environments/RoomEnvironment.js';
        import { RGBELoader } from 'three/addons/loaders/RGBELoader.js';

        // Keep Firebase only for Authentication (generating UIDs)
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getAuth, signInWithCustomToken, signInAnonymously, onAuthStateChanged, signOut, GoogleAuthProvider, signInWithPopup, createUserWithEmailAndPassword, signInWithEmailAndPassword } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";

        // Environment variables / Firebase setup
        const fbConfig = typeof __firebase_config !== 'undefined' ? JSON.parse(__firebase_config) : {
            apiKey: "AIzaSyBVfZ0hg-YusIB0K208Bsf2iqwEaqFZGRI",
            authDomain: "chess-d94d5.firebaseapp.com",
            projectId: "chess-d94d5"
        };

        let firebaseApp, auth;
        try {
            firebaseApp = initializeApp(fbConfig);
            auth = getAuth(firebaseApp);
        } catch (e) {
            console.warn("Initialization issue with Firebase.");
        }

        // ==========================================
        // BACKEND API CONNECTION CONFIGURATION
        // ==========================================
        const isLocalFile = window.location.protocol === 'file:' || window.location.port === '5500' || window.location.port === '3000';
        const isLocalHost = window.location.hostname === '127.0.0.1' || window.location.hostname === 'localhost';

        let API_BASE = "/api";
        let WS_BASE = `${window.location.protocol === "https:" ? "wss:" : "ws:"}//${window.location.host}/ws`;

        // If running locally or within the Canvas iframe (blob:), default to local backend
        if (isLocalFile || window.location.protocol === 'blob:' || isLocalHost) {
            API_BASE = "http://127.0.0.1:8000/api";
            WS_BASE = "ws://127.0.0.1:8000/ws";
        }

        let ws = null;
        let gpsPingInterval = null;

        const state = {
            user: null,
            myProfile: null,
            players: [],
            messages: [],
            currentView: 'loading',
            mainSubView: 'arena',
            selectedPlayer: null,
            radarFilters: { radius: '0.5', rankedMode: false, customRange: '10' },
            premiumPromoOpen: false,
            rankedPromoOpen: false,
            editorData: null,
            activeGame: null,
            pendingGameId: null,
            activeChat: null,
            matchFormData: null,
            quickChatOpen: false
        };

        window.app = {};

        // ==========================================
        // WEBSOCKET LOGIC (Connecting to FastAPI)
        // ==========================================
        function initWebSocket(uid) {
            if (ws) ws.close();
            try {
                ws = new WebSocket(`${WS_BASE}/${uid}`);
                ws.onmessage = (event) => {
                    const msg = JSON.parse(event.data);
                    if (msg.type === 'RADAR_UPDATE') {
                        app.fetchPlayers();
                    } else if (msg.type === 'SERVER_ANNOUNCEMENT') {
                        app.showToast("SERVER: " + msg.data, false);
                    } else if (msg.type === 'NEW_MATCH_REQUEST' || msg.type === 'CHAT_UPDATE' || msg.type === 'MESSAGE_UPDATED') {
                        app.fetchMessages();

                        // Sync Game State via Hidden Chat Messages
                        if (msg.type === 'CHAT_UPDATE' && state.activeGame && msg.messageId === state.activeGame.id) {
                            if (msg.chat && msg.chat.text && msg.chat.text.startsWith('FEN:')) {
                                const fen = msg.chat.text.substring(4);
                                if (app.ar.game && app.ar.game.fen() !== fen) {
                                    app.ar.game.load(fen);
                                    syncBoardToGameAR();
                                    app.updateGameStatusAR();
                                    app.audio.playMoveSound(false, app.ar.game.in_check());
                                    if (!app.clock.isRunning && !app.ar.game.game_over()) app.startClock();
                                    if (app.ar.game.game_over()) app.showGameOverBanner();
                                }
                            } else if (msg.chat && msg.chat.text && msg.chat.text.startsWith('QUICK:')) {
                                // Extract Quick Chat phrase
                                const phrase = msg.chat.text.substring(6);
                                const senderName = msg.chat.senderId === state.user.uid ? 'You' : 'Opponent';
                                // Display as a non-error toast
                                app.showToast(`${senderName}: ${phrase}`, false);
                            }
                        }
                    }
                };
                ws.onclose = () => { setTimeout(() => { if(state.user) initWebSocket(uid); }, 3000); };
                ws.onerror = (e) => { console.warn("WebSocket connection error"); };

                if(gpsPingInterval) clearInterval(gpsPingInterval);
                gpsPingInterval = setInterval(() => {
                    if (ws && ws.readyState === WebSocket.OPEN && state.myProfile && state.myProfile.coords) {
                        ws.send(JSON.stringify({ type: "GPS_PING", coords: state.myProfile.coords }));
                    }
                }, 10000);

            } catch (err) {
                console.warn("WebSocket failed to construct:", err.message);
                setTimeout(() => { if(state.user) initWebSocket(uid); }, 5000);
            }
        }

        window.addEventListener('beforeunload', () => {
            if (ws) { ws.onclose = null; ws.close(); }
            if (state.user && state.myProfile && state.myProfile.isOnline) {
                try { navigator.sendBeacon(`${API_BASE}/players/${state.user.uid}`, JSON.stringify({ isOnline: false })); } catch(e) {}
            }
        });

        // ==========================================
        // DUAL CHESS CLOCK LOGIC & STATE
        // ==========================================
        app.clock = {
            whiteTime: 600,
            blackTime: 600,
            lastTime: 0,
            isRunning: false,
            textureW: null, textureB: null, ctxW: null, ctxB: null, buttonW: null, buttonB: null
        };

        app.formatTime = (seconds) => {
            const m = Math.floor(Math.max(0, seconds) / 60);
            const s = Math.floor(Math.max(0, seconds) % 60);
            return `${m}:${s.toString().padStart(2, '0')}`;
        };

        app.startClock = () => {
            app.clock.isRunning = true;
            app.clock.lastTime = performance.now();
        };

        app.stopClock = () => {
            app.clock.isRunning = false;
        };

        app.resetClock = () => {
            app.clock.whiteTime = 600;
            app.clock.blackTime = 600;
            app.clock.isRunning = false;
            app.updateClockUI();
        };

        app.tickClock = () => {
            if (!app.clock.isRunning) return;

            // Stop if game is over
            if (app.ar.game && app.ar.game.game_over()) {
                app.stopClock();
                return;
            }

            const now = performance.now();

            const pawnEvalWhite = [
                [0,  0,  0,  0,  0,  0,  0,  0],
                [5,  5,  5,  5,  5,  5,  5,  5],
                [1,  1,  2,  3,  3,  2,  1,  1],
                [0.5,  0.5,  1,  2.5,  2.5,  1,  0.5,  0.5],

                [0.5, -0.5,-1,  0,  0, -1, -0.5,  0.5],

                [0,  0,  0,  0,  0,  0,  0,  0]

            const knightEval = [
                [-5, -4, -3, -3, -3, -3, -4, -5],
                [-4, -2,  0,  0.5,  0.5,  0, -2, -4],
                [-3,  0,  1,  1.5,  1.5,  1,  0, -3],
                [-3,  0.5,  1.5,  2,  2,  1.5,  0.5, -3],
                [-3,  0,  1.5,  2,  2,  1.5,  0, -3],
                [-3,  0.5,  1,  1.5,  1.5,  1,  0.5, -3],
                [-4, -2,  0,  0.5,  0.5,  0, -2, -4],
                [-5, -4, -3, -3, -3, -3, -4, -5]

            function evaluateBoard(game) {
                let evalScore = 0; const board = game.board();
                for (let r = 0; r < 8; r++) {
                    for (let c = 0; c < 8; c++) {
                        const piece = board[r][c];
                        if (piece) {
                            let val = pieceValues[piece.type];
                            if (piece.type === 'p') val += (piece.color === 'w' ? pawnEvalWhite[r][c] : pawnEvalWhite[7-r][c]);
                            else if (piece.type === 'n') val += knightEval[r][c];
                            else if (piece.type === 'b' || piece.type === 'q') val += (r > 2 && r < 5 && c > 2 && c < 5) ? 1.5 : 0;
                            evalScore += (piece.color === 'w') ? val : -val;
                        }
                    }
                }
                return evalScore;
            }

            function minimax(game, depth, alpha, beta, isMaximizingPlayer) {
                if (depth === 0 || game.game_over()) return evaluateBoard(game);
                const moves = game.moves({ verbose: true });
                moves.sort((a, b) => {
                    let scoreA = (a.captured ? pieceValues[a.captured] : 0) + (a.flags.includes('p') ? 80 : 0);
                    let scoreB = (b.captured ? pieceValues[b.captured] : 0) + (b.flags.includes('p') ? 80 : 0);
                    return scoreB - scoreA;
                });

                if (isMaximizingPlayer) {
                    let bestVal = -Infinity;
                    for (let i = 0; i < moves.length; i++) {
                        game.move(moves[i].san);
                        bestVal = Math.max(bestVal, minimax(game, depth - 1, alpha, beta, false));

                    }

                }

                let bestMove = null; let bestVal = isMaximizing ? -Infinity : Infinity;

                for (let i = 0; i < moves.length; i++) {
                    game.move(moves[i].san);
                    const boardVal = minimax(game, depth - 1, -Infinity, Infinity, !isMaximizing);
                    game.undo();

                    if (isMaximizing) {
                        if (boardVal > bestVal) { bestVal = boardVal; bestMove = moves[i]; }
                    } else {
                        if (boardVal < bestVal) { bestVal = boardVal; bestMove = moves[i]; }
                    }
                }
                if (!bestMove) bestMove = moves[0];
                self.postMessage({ bestMove });
            };
        `;

                                <button onclick="app.openChat('${msg.id}')" class="bg-blue-600 hover:bg-blue-500 text-white font-black px-4 py-2.5 rounded-lg text-sm uppercase transition-colors flex justify-center items-center gap-2"><i data-lucide="message-circle" class="w-4 h-4"></i> Chat</button>
                            ` : ''}
                            ${msg.status === 'pending' && isSender ? `<button disabled class="w-full bg-neutral-800 text-neutral-500 font-bold py-2 rounded-lg text-sm uppercase cursor-not-allowed">Waiting for Response...</button>` : ''}
                        </div>
                    </div>
                `;
            });
            html += `</div></div>`; return html;
        }

        function templateChatModal() {
            const chat = state.activeChat; const otherName = chat.senderId === state.user.uid ? chat.recipientName : chat.senderName;
            let logsHtml = '';
            if (chat.chatLogs && chat.chatLogs.length > 0) {
                chat.chatLogs.forEach(log => {
                    if (log.text && log.text.startsWith('FEN:')) return; // Hide board state syncs from UI
                    if (log.text && log.text.startsWith('QUICK:')) {
                        // Display Quick chat inside the chat box too
                        log.text = log.text.substring(6);
                    }
                    const isMe = log.senderId === state.user.uid; const isSys = log.senderId === 'system';
                    const timeStr = new Date(log.timestamp * 1000).toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });

                    if (isSys) { logsHtml += `<div class="text-center my-3"><span class="bg-neutral-800 text-neutral-400 text-[10px] uppercase px-3 py-1 rounded-full font-bold">${app.clean(log.text)}</span></div>`; }
                    else {
                        logsHtml += `<div class="flex flex-col ${isMe ? 'items-end' : 'items-start'} mb-3">
                                        <div class="max-w-[75%] rounded-2xl px-4 py-2 text-sm ${isMe ? 'bg-blue-600 text-white rounded-br-none' : 'bg-neutral-800 text-neutral-200 rounded-bl-none border border-neutral-700'}">${app.clean(log.text)}</div>
                                        <span class="text-[10px] text-neutral-500 mt-1 font-bold">${timeStr}</span>
                                     </div>`;
                    }
                });
            } else { logsHtml = `<div class="text-center text-neutral-500 text-sm mt-10">Start the conversation!</div>`; }

            return `
                <div class="fixed inset-0 z-50 flex items-center justify-center p-0 sm:p-4 bg-neutral-950/80 backdrop-blur-md pointer-events-auto">
                    <div class="bg-neutral-900 border border-neutral-800 sm:rounded-3xl w-full h-[100dvh] sm:h-[80vh] max-w-lg flex flex-col shadow-2xl relative overflow-hidden">
                        <div class="p-4 border-b border-neutral-800 flex justify-between items-center bg-neutral-950 shrink-0 shadow-md z-10">
                            <div class="flex items-center gap-3"><button onclick="app.closeChat()" class="text-neutral-400 hover:text-white"><i data-lucide="arrow-left" class="w-5 h-5"></i></button><h3 class="font-black text-white text-lg">${app.clean(otherName)}</h3></div>
                        </div>
                        <div id="chat-scroll-box" class="flex-1 overflow-y-auto p-4 bg-neutral-950/50 flex flex-col">${logsHtml}</div>
                        <div class="p-3 border-t border-neutral-800 bg-neutral-950 shrink-0">
                            <form onsubmit="app.sendChatMessage(event)" class="flex gap-2 relative">
                                <input type="text" id="chat-input-text" placeholder="Message..." class="flex-1 bg-neutral-900 border border-neutral-700 rounded-full px-4 py-2.5 text-sm text-white focus:outline-none focus:border-blue-500 pr-12">
                                <button type="submit" class="absolute right-1.5 top-1.5 bottom-1.5 bg-blue-600 hover:bg-blue-500 text-white w-9 rounded-full flex items-center justify-center transition-colors"><i data-lucide="send" class="w-4 h-4 ml-0.5"></i></button>
                            </form>
                        </div>
                    </div>
                </div>
            `;
        }

        function templateMatchModal() {
            const md = state.matchFormData;
            return `
                <div class="fixed inset-0 z-50 flex items-center justify-center p-4 bg-neutral-950/80 backdrop-blur-md pointer-events-auto">
                    <div class="bg-neutral-900 border border-neutral-800 rounded-3xl w-full max-w-sm flex flex-col shadow-2xl relative overflow-hidden">
                        <div class="p-5 border-b border-neutral-800 flex justify-between items-center bg-neutral-950">
                            <h3 class="text-lg font-black text-white uppercase tracking-wide flex items-center"><i data-lucide="swords" class="w-5 h-5 mr-2 text-yellow-500"></i> Challenge</h3>
                            <button onclick="app.closeMatchModal()" class="text-neutral-500 hover:text-white bg-neutral-800 rounded-full p-1"><i data-lucide="x" class="h-4 w-4"></i></button>
                        </div>
                        <div class="p-5 space-y-4">
                            <div class="flex items-center gap-3 bg-neutral-950 p-3 rounded-xl border border-neutral-800">
                                <img src="${app.clean(md.targetAvatar)}" class="w-12 h-12 rounded-full border border-neutral-700">
                                <div><p class="text-xs text-neutral-500 font-bold uppercase">Opponent</p><p class="text-white font-bold">${app.clean(md.targetName)}</p></div>
                            </div>
                            <div>
                                <label class="block text-xs font-bold text-neutral-400 mb-1 uppercase">Location</label>
                                <input type="text" value="${app.clean(md.location)}" oninput="app.matchFormData.location = this.value" class="w-full bg-neutral-950 border border-neutral-700 p-3 rounded-xl text-white outline-none focus:border-yellow-500 text-sm">
                            </div>
                            <div class="grid grid-cols-2 gap-3">
                                <div><label class="block text-xs font-bold text-neutral-400 mb-1 uppercase">Time</label><input type="text" value="${app.clean(md.time)}" oninput="app.matchFormData.time = this.value" class="w-full bg-neutral-950 border border-neutral-700 p-3 rounded-xl text-white outline-none focus:border-yellow-500 text-sm"></div>
                                <div><label class="block text-xs font-bold text-neutral-400 mb-1 uppercase">Format</label><input type="text" value="${app.clean(md.format)}" oninput="app.matchFormData.format = this.value" class="w-full bg-neutral-950 border border-neutral-700 p-3 rounded-xl text-white outline-none focus:border-yellow-500 text-sm"></div>
                            </div>
                            <div>
                                <label class="block text-xs font-bold text-neutral-400 mb-1 uppercase">Message</label>
                                <textarea oninput="app.matchFormData.text = this.value" class="w-full bg-neutral-950 border border-neutral-700 p-3 rounded-xl text-white outline-none focus:border-yellow-500 text-sm resize-none" rows="2">${app.clean(md.text)}</textarea>
                            </div>
                            <button onclick="app.sendMatchRequest()" id="btn-send-match" class="w-full bg-yellow-500 hover:bg-yellow-400 text-neutral-900 font-black py-3.5 rounded-xl uppercase tracking-wide transition-colors mt-2 shadow-[0_0_15px_rgba(234,179,8,0.3)]">Send Challenge</button>
                        </div>
                    </div>
                </div>
            `;
        }

        function templateEditor() {
            const fd = state.editorData; const isSaving = fd.saving;
            return `
                <div class="fixed inset-0 z-50 flex items-center justify-center p-0 sm:p-4 bg-neutral-950/80 backdrop-blur-md">
                    <div class="bg-neutral-900 border border-neutral-800 sm:rounded-3xl w-full h-[100dvh] sm:h-auto sm:max-h-[90vh] max-w-lg flex flex-col shadow-2xl relative overflow-hidden">
                        <div class="p-4 sm:p-6 border-b border-neutral-800 flex justify-between items-center bg-neutral-950 shrink-0"><h3 class="text-lg sm:text-xl font-black text-white uppercase tracking-wide truncate pr-4">Edit Profile</h3><button onclick="app.closeEditor()" class="text-neutral-500 hover:text-white bg-neutral-800 rounded-full p-1.5 shrink-0"><i data-lucide="x" class="h-5 w-5"></i></button></div>
                        <div class="p-4 sm:p-6 space-y-4 sm:space-y-6 flex-1 min-h-0 overflow-y-auto w-full">
                            <div><label class="block text-xs sm:text-sm font-bold text-neutral-400 mb-1 sm:mb-2 uppercase tracking-wider">Display Name</label><input type="text" id="editor-name" value="${app.clean(fd.name) || ''}" oninput="app.updateEditor('name', this.value)" class="w-full p-3 sm:p-3.5 rounded-xl border border-neutral-700 bg-neutral-950 text-white focus:ring-1 focus:ring-yellow-500 outline-none text-sm sm:text-base min-w-0"></div>
                            <div><label class="block text-xs sm:text-sm font-bold text-neutral-400 mb-1 sm:mb-2 uppercase tracking-wider">Status Statement</label><input type="text" id="editor-status" value="${app.clean(fd.status) || ''}" oninput="app.updateEditor('status', this.value)" class="w-full p-3 sm:p-3.5 rounded-xl border border-neutral-700 bg-neutral-950 text-white focus:ring-1 focus:ring-yellow-500 outline-none text-sm sm:text-base placeholder:truncate min-w-0"></div>
                            <div class="pt-4 sm:pt-6 border-t border-neutral-800 mt-4 sm:mt-6 shrink-0"><button onclick="app.signOut()" class="w-full bg-red-500/10 text-red-500 py-3 sm:py-3.5 rounded-xl font-black text-xs sm:text-sm hover:bg-red-500/20 uppercase tracking-wide border border-red-500/30 transition-colors">Log Out Account</button></div>
                        </div>
                        <div class="p-4 sm:p-6 border-t border-neutral-800 bg-neutral-950 shrink-0 pb-8 sm:pb-6"><button onclick="app.saveProfile()" class="w-full bg-yellow-500 text-neutral-950 py-3 sm:py-4 rounded-xl font-black text-base sm:text-lg hover:bg-yellow-400 uppercase tracking-wide transition-colors">${isSaving ? 'Saving...' : 'Save Profile'}</button></div>
                    </div>
                </div>
            `;
        }

        // --- WINDOW EXPORTED ACTIONS ---
        app.setView = (view) => { if (state.mainSubView === 'arena' && view !== 'arena') app.stopAR(); state.mainSubView = view; updateMainView(); };
        app.openLeaderboard = () => { if (!state.myProfile.hasRanked) { state.rankedPromoOpen = true; renderModals(); return; } app.setView('leaderboard'); };
        app.openPremiumPromo = () => { state.premiumPromoOpen = true; renderModals(); };
        app.closePremiumPromo = () => { state.premiumPromoOpen = false; renderModals(); };

        app.patchProfile = async (updates) => {
            if (!state.user) return;
            try {
                await fetch(`${API_BASE}/players/${state.user.uid}`, {
                    method: 'PATCH',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify(updates)
                });
                if (state.myProfile) Object.assign(state.myProfile, updates);
            } catch(e) {}
        };

        app.simulatePremiumPurchase = async () => {
            const btn = getEl('btn-buy-premium'); if (btn) { btn.disabled = true; btn.innerHTML = `<i data-lucide="loader-2" class="w-5 h-5 animate-spin mx-auto inline"></i> Processing...`; renderIcons(); }
            setTimeout(async () => {
                await app.patchProfile({ isPremium: true, hasRanked: true });
                state.premiumPromoOpen = false; state.rankedPromoOpen = false; state.radarFilters.rankedMode = true; app.showToast("Welcome to Chrono Chess PRO!", false); renderModals(); renderMainContent(); updateNav();
            }, 800);
        };

        app.setCustomRange = (val) => { state.radarFilters.customRange = val; renderMainContent(); };
        app.toggleIncognito = async () => { const newState = !state.myProfile.isIncognito; await app.patchProfile({ isIncognito: newState }); app.showToast(newState ? "Incognito Mode ON" : "Incognito Mode OFF", false); renderMainContent(); };
        app.setRankedMode = async (val) => { if (val && !state.myProfile.hasRanked) { state.rankedPromoOpen = true; renderModals(); return; } state.radarFilters.rankedMode = val; renderMainContent(); };
        app.closeRankedPromo = () => { state.rankedPromoOpen = false; renderModals(); };
        app.simulateRankedPurchase = async () => { await app.patchProfile({ hasRanked: true }); state.rankedPromoOpen = false; state.radarFilters.rankedMode = true; app.showToast("Ranked Mode Unlocked!", false); renderModals(); renderMainContent(); };
        app.selectPlayer = (id) => { state.selectedPlayer = state.players.find(p => p.id === id); state.mainSubView = 'profile'; updateMainView(); };

        app.handleGoogleSignIn = async () => {
            try {
                const provider = new GoogleAuthProvider();
                await signInWithPopup(auth, provider);
            } catch (err) {
                getEl('auth-error').textContent = "Sign in cancelled.";
                getEl('auth-error').classList.remove('hidden');
            }
        };

        app.handleConnect = async () => {
            const username = getEl('input-username').value.trim();
            const errEl = getEl('profile-error');
            const btn = getEl('btn-connect');

            if (!username) {
                if (errEl) { errEl.textContent = "Please enter a display name."; errEl.classList.remove('hidden'); }
                return;
            }
            if (!state.user) return; // Wait for firebase auth

            if(btn) { btn.disabled = true; btn.innerHTML = `<i data-lucide="loader-2" class="w-5 h-5 mr-2 animate-spin shrink-0"></i> Creating Profile...`; renderIcons(); }
            if (errEl) errEl.classList.add('hidden');

            const uid = state.user.uid;
            const seedStr = state.user.isAnonymous ? uid : (state.user.email || uid);

            const newProfile = {
                id: uid, name: username, avatar: `https://api.dicebear.com/9.x/bottts-neutral/svg?seed=${seedStr}&backgroundColor=eab308`,
                status: 'Looking for a game!', baseLocation: 'Local Area', isOnline: true, elo: 1200, wins: 0, losses: 0, hasRanked: false
            };

            try {
                await fetch(`${API_BASE}/players`, {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify(newProfile)
                });

                state.myProfile = newProfile;
                app.goOnline(); // Get GPS & Patch
                state.currentView = 'main';

                initWebSocket(uid);
                app.fetchMessages();
                app.fetchPlayers();

                updateMainView();
            } catch(e) {
                if (errEl) { errEl.textContent = "Connection to server failed."; errEl.classList.remove('hidden'); }
                if (btn) { btn.disabled = false; btn.innerHTML = 'Enter Arena'; }
            }
        };

        app.authMode = 'login';

        app.toggleAuthMode = () => {
            app.authMode = app.authMode === 'login' ? 'signup' : 'login';
            const btnAuth = getEl('btn-email-auth');
            const btnToggle = getEl('btn-toggle-auth');
            if(btnAuth) btnAuth.innerText = app.authMode === 'login' ? 'Sign In' : 'Create Account';
            if(btnToggle) btnToggle.innerText = app.authMode === 'login' ? 'Need an account? Sign Up' : 'Already have an account? Sign In';
        };

        app.handleEmailAuth = async () => {
            const email = getEl('input-email').value.trim();
            const password = getEl('input-password').value;
            const errEl = getEl('auth-error');
            if(errEl) errEl.classList.add('hidden');

            if (!email || !password) {
                if(errEl) { errEl.innerText = "Email and password are required."; errEl.classList.remove('hidden'); }
                return;
            }

            const btn = getEl('btn-email-auth');
            const originalText = btn.innerText;
            btn.innerHTML = `<i data-lucide="loader-2" class="w-5 h-5 animate-spin"></i>`;
            renderIcons();

            try {
                if (app.authMode === 'login') {
                    await signInWithEmailAndPassword(auth, email, password);
                } else {
                    await createUserWithEmailAndPassword(auth, email, password);
                }
            } catch (error) {
                if(errEl) {
                    errEl.innerText = error.message.replace('Firebase: ', '');
                    errEl.classList.remove('hidden');
                }
                btn.innerText = originalText;
            }
        };

        app.handleGuestPlay = async () => {
            const errEl = getEl('auth-error');
            if(errEl) errEl.classList.add('hidden');
            const btn = getEl('btn-guest-play');
            const originalText = btn.innerText;
            btn.innerHTML = `<i data-lucide="loader-2" class="w-4 h-4 animate-spin inline mr-2"></i> Connecting...`;
            renderIcons();

            try {
                await signInAnonymously(auth);
            } catch(e) {
                if(errEl) { errEl.innerText = "Failed to create guest session."; errEl.classList.remove('hidden'); }
                btn.innerText = originalText;
            }
        };

        app.signOut = async () => {
            try {
                if (state.myProfile && state.myProfile.isOnline) await app.goOffline();
                await signOut(auth);
                state.user = null; state.myProfile = null; app.closeEditor(); state.currentView = 'onboarding'; updateMainView();
            } catch (err) {}
        };

        app.goOnline = () => { if (!navigator.geolocation) return; navigator.geolocation.getCurrentPosition(async (pos) => { await app.patchProfile({ isOnline: true, coords: { lat: pos.coords.latitude, lng: pos.coords.longitude } }); updateMainView(); app.showToast("You are now online!", false); }, () => {}, { enableHighAccuracy: true }); };
        app.goOffline = async () => { await app.patchProfile({ isOnline: false }); updateMainView(); };
        app.openEditor = () => { const p = state.myProfile; if (!p) return; state.editorData = { saving: false, name: p.name || '', status: p.status || '', avatar: p.avatar || '' }; renderModals(); };
        app.closeEditor = () => { state.editorData = null; renderModals(); };
        app.updateEditor = (field, val) => { if (!state.editorData) return; state.editorData[field] = val; };
        app.saveProfile = async () => { if (!state.editorData) return; state.editorData.saving = true; renderModals(); await app.patchProfile({ name: state.editorData.name, status: state.editorData.status }); state.editorData = null; renderModals(); renderMainContent(); updateNav(); };

        // Fetching handles replacing snapshot listeners
        app.fetchPlayers = async () => {
            if (!state.user) return;
            try {
                const res = await fetch(`${API_BASE}/players`);
                if (res.ok) {
                    state.players = await res.json();
                    if (state.mainSubView === 'radar' || state.mainSubView === 'leaderboard') renderMainContent();
                }
            } catch(e) {}
        };

        app.fetchMessages = async () => {
            if (!state.user) return;
            try {
                const res = await fetch(`${API_BASE}/messages/${state.user.uid}`);
                if (res.ok) {
                    state.messages = await res.json();

                    const unreadCount = state.messages.filter(m => m.recipientId === state.user.uid && !m.read && m.status === 'pending').length;
                    const badge = getEl('unread-badge');
                    if (badge) {
                        if (unreadCount > 0) { badge.textContent = unreadCount; badge.classList.remove('hidden'); }
                        else { badge.classList.add('hidden'); }
                    }

                    if (state.activeChat) {
                        const updated = state.messages.find(m => m.id === state.activeChat.id);
                        if (updated) { state.activeChat = updated; renderModals(); }
                    }

                    // Auto-start game if a pending match request was accepted
                    if (state.pendingGameId) {
                        const startedMsg = state.messages.find(m => m.id === state.pendingGameId && m.status === 'accepted');
                        if (startedMsg) {
                            state.pendingGameId = null; state.activeGame = { id: startedMsg.id, myColor: 'w', isBot: false };
                            app.setupBoardForColor('w'); app.setView('arena'); app.showToast("Opponent accepted! You play as White.", false);
                        }
                    }

                    if (state.mainSubView === 'messages') renderMainContent();
                }
            } catch (e) { console.warn("Network error fetching messages."); }
        };

        app.openMatchModal = () => {
            const p = state.selectedPlayer; if (!p) return;
            state.matchFormData = { targetId: p.id, targetName: p.name, targetAvatar: p.avatar, location: 'Arena Match', time: 'Now', format: 'Standard Chess', text: 'Let us play a game!' };
            renderModals();
        };

        app.closeMatchModal = () => { state.matchFormData = null; renderModals(); };

        app.sendMatchRequest = async (silent = false) => {
            if (!state.user || !state.matchFormData) return;
            const btn = getEl('btn-send-match');
            if (btn) btn.innerHTML = '<i data-lucide="loader-2" class="w-5 h-5 animate-spin inline"></i> Sending...';

            try {
                const res = await fetch(`${API_BASE}/messages`, {
                    method: 'POST', headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        senderId: state.user.uid, recipientId: state.matchFormData.targetId, senderName: state.myProfile.name, recipientName: state.matchFormData.targetName,
                        senderAvatar: state.myProfile.avatar, recipientAvatar: state.matchFormData.targetAvatar, text: state.matchFormData.text, location: state.matchFormData.location, time: state.matchFormData.time, format: state.matchFormData.format
                    })
                });
                const data = await res.json();
                state.pendingGameId = data.messageId; // Track this to auto-start when accepted

                if (!silent) app.showToast("Challenge sent successfully!", false);
                app.closeMatchModal();
                app.fetchMessages();
            } catch (e) {
                if (!silent) app.showToast("Network error. Challenge not sent.", true);
                if (btn) btn.innerHTML = 'Send Challenge';
            }
        };

        app.updateMsgStatus = async (msgId, status) => {
            try {
                await fetch(`${API_BASE}/messages/${msgId}`, {
                    method: 'PATCH',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ status: status, read: true })
                });
                app.fetchMessages();
            } catch (e) { app.showToast("Failed to update status.", true); }
        };

        app.acceptMatch = async (msgId) => {
            await app.updateMsgStatus(msgId, 'accepted');
            state.activeGame = { id: msgId, myColor: 'b', isBot: false };
            app.setupBoardForColor('b'); app.setView('arena'); app.showToast("Match accepted! You play as Black.", false);
            // Setup UI buttons
            const btnFind = getEl('btn-find-match'); const btnBot = getEl('btn-play-bot'); const btnLeave = getEl('btn-leave-match'); const btnChat = getEl('btn-arena-chat'); const btnQuick = getEl('btn-quick-chat');
            if (btnFind) btnFind.classList.add('hidden');
            if (btnBot) btnBot.classList.add('hidden');
            if (btnLeave) { btnLeave.classList.remove('hidden'); btnLeave.innerHTML = 'Resign Match'; }
            if (btnChat) btnChat.classList.remove('hidden');
            if (btnQuick) btnQuick.classList.remove('hidden');
        };

        app.enterArena = (msgId, color) => {
            state.activeGame = { id: msgId, myColor: color, isBot: false };
            app.setupBoardForColor(color); app.setView('arena');
            // Setup UI buttons
            const btnFind = getEl('btn-find-match'); const btnBot = getEl('btn-play-bot'); const btnLeave = getEl('btn-leave-match'); const btnChat = getEl('btn-arena-chat'); const btnQuick = getEl('btn-quick-chat');
            if (btnFind) btnFind.classList.add('hidden');
            if (btnBot) btnBot.classList.add('hidden');
            if (btnLeave) { btnLeave.classList.remove('hidden'); btnLeave.innerHTML = 'Resign Match'; }
            if (btnChat) btnChat.classList.remove('hidden');
            if (btnQuick) btnQuick.classList.remove('hidden');
        };

        app.openChat = (msgId) => {
            const msg = state.messages.find(m => m.id === msgId);
            if (msg) {
                state.activeChat = msg; renderModals();
                if (msg.recipientId === state.user.uid && !msg.read) {
                    fetch(`${API_BASE}/messages/${msgId}`, {
                        method: 'PATCH',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ read: true })
                    }).then(() => app.fetchMessages()).catch(e => console.warn(e));
                }
            }
        };

        app.openCurrentGameChat = () => {
            if (state.activeGame && !state.activeGame.isBot) {
                app.openChat(state.activeGame.id);
            }
        };

        app.closeChat = () => { state.activeChat = null; renderModals(); };

        app.toggleQuickChat = () => {
            const menu = getEl('quick-chat-menu');
            if (menu) {
                state.quickChatOpen = !state.quickChatOpen;
                if (state.quickChatOpen) {
                    menu.classList.remove('hidden');
                    menu.classList.add('flex');
                } else {
                    menu.classList.add('hidden');
                    menu.classList.remove('flex');
                }
            }
        };

        app.sendQuickChat = async (phrase) => {
            app.toggleQuickChat(); // close menu
            if (!state.activeGame || state.activeGame.isBot || !state.user) return;

            // Send the QUICK: prefixed phrase
            try {
                await fetch(`${API_BASE}/messages/${state.activeGame.id}/chat`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ senderId: state.user.uid, text: 'QUICK:' + phrase })
                });

                // Show it for ourselves immediately
                app.showToast(`You: ${phrase}`, false);

                // We don't necessarily need to fetchMessages if we don't have the chat modal open,
                // but we keep the state in sync just in case.
                app.fetchMessages();
            } catch(e) { app.showToast("Failed to send quick chat.", true); }
        };

        app.sendChatMessage = async (event) => {
            if (event) event.preventDefault();
            const input = getEl('chat-input-text'); if (!input || !input.value.trim() || !state.activeChat || !state.user) return;
            const text = input.value.trim(); input.value = '';
            try {
                await fetch(`${API_BASE}/messages/${state.activeChat.id}/chat`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ senderId: state.user.uid, text: text })
                });
                app.fetchMessages();
            } catch(e) { app.showToast("Failed to send message.", true); }
        };

        if (auth) {
            initAuth();

            onAuthStateChanged(auth, async (user) => {
                state.user = user;
                if (user) {
                    try {
                        const res = await fetch(`${API_BASE}/players/${user.uid}`);
                        if (res.ok) {
                            state.myProfile = await res.json();
                            state.currentView = 'main';

                            initWebSocket(user.uid);
                            app.fetchMessages();
                            app.fetchPlayers();
                        } else {
                            // Profile not created yet
                            state.currentView = 'onboarding';
                            getEl('onboard-step-auth').classList.add('hidden');
                            getEl('onboard-step-profile').classList.remove('hidden');
                        }
                    } catch(e) {
                        state.currentView = 'onboarding';
                        getEl('onboard-step-auth').classList.add('hidden');
                        getEl('onboard-step-profile').classList.remove('hidden');
                    }
                    updateMainView();
                } else {
                    if (ws) { ws.close(); ws = null; }
                    state.currentView = 'onboarding';
                    state.myProfile = null;
                    // Reset to Auth Step
                    const authStep = getEl('onboard-step-auth');
                    const profileStep = getEl('onboard-step-profile');
                    if(authStep) authStep.classList.remove('hidden');
                    if(profileStep) profileStep.classList.add('hidden');
                    updateMainView();
                }
            });
        }

    </script>
</body>
</html>
